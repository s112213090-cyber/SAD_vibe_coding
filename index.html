<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="./">
    <title>寵物分享交流平台</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff7f2;
            margin: 0;
            color: #444;
        }

        header {
            background: #ff9ecb;
            padding: 15px;
            color: #fff;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .1);
            margin: 15px 0;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        button {
            background: #ff8bb8;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
        }

        button:hover {
            background: #ff6aa4;
        }

        .post-img,
        .avatar {
            max-width: 100px;
            border-radius: 50%;
        }

        .hidden {
            display: none;
        }

        .post {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }

        .icon {
            cursor: pointer;
            margin-right: 10px;
        }

        .nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .captcha-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 4px solid transparent;
            transition: 0.2s;
        }

        .captcha-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .captcha-item.selected {
            border-color: #ff8bb8;
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <header>🐾 寵物分享交流平台</header>

    <div class="container">

        <div class="nav">
            <button onclick="showPage('loginPage')" id="navLoginBtn">
                登入/註冊
            </button>

            <button onclick="showPage('homePage')">
                個人首頁
            </button>

            <button onclick="showPage('sharePage')">
                分享區
            </button>
        </div>

        <!-- 登入註冊 -->
        <div id="loginPage" class="card">

            <h2>登入 / 註冊</h2>

            <input id="regId" placeholder="ID">
            <input id="regName" placeholder="名稱">
            <input id="regPass" type="password" placeholder="密碼">
            <input type="file" id="regAvatar">

            <button onclick="register()">
                註冊
            </button>

            <hr>

            <input id="loginId" placeholder="ID">
            <input id="loginPass" type="password" placeholder="密碼">

            <button onclick="login()">
                登入
            </button>

        </div>

        <!-- 首頁 -->
        <div id="homePage" class="card hidden">

            <h2 id="welcome"></h2>

            <div style="display:flex; gap:10px; margin-bottom:15px;">

                <button onclick="showPage('postPage')">
                    新增貼文
                </button>

                <button onclick="logout()" style="background:#999;">
                    登出
                </button>

            </div>

            <div id="myPosts"></div>

        </div>

        <!-- 發文 -->
        <div id="postPage" class="card hidden">

            <h2>發布貼文</h2>

            <img id="postAvatar" class="avatar">

            <p id="postUser"></p>

            <input id="postTitle" placeholder="發布主題">

            <textarea id="postContent" placeholder="發布內容"></textarea>

            <input type="file" id="postImage">

            <button onclick="publishPost()">
                發布
            </button>

        </div>

        <!-- 分享區 -->
        <div id="sharePage" class="card hidden">

            <h2>分享區</h2>

            <div id="allPosts"></div>

        </div>

        <!-- 使用者頁面 -->
        <div id="userProfilePage" class="card hidden">

            <div style="display:flex; gap:20px; align-items:center;">

                <img id="userProfileAvatar" class="avatar">

                <div>
                    <h2 id="userProfileName"></h2>
                    <span id="userProfileId"></span>
                </div>

            </div>

            <hr>

            <div id="userProfilePosts"></div>

        </div>

        <!-- 驗證 -->
        <div id="tfaPage" class="card hidden">

            <h2>我不是機器人驗證</h2>

            <p>
                請選出所有包含
                <span id="captchaThemeText"></span>
                的圖片
            </p>

            <div id="captchaGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:300px;">
            </div>

            <br>

            <button onclick="verifyCaptcha()">
                驗證
            </button>

        </div>

    </div>

    <script defer>

        let users =
            JSON.parse(localStorage.getItem('users') || '[]');

        let posts =
            JSON.parse(localStorage.getItem('posts') || '[]');

        let currentUser =
            JSON.parse(localStorage.getItem('currentUser') || 'null');

        let tempLoginUser = null;

        let captchaSelected = [];
        let captchaCorrectIndexes = [];

        let currentViewedUserId = null;

        const captchaThemes = [
            { name: '🐶 狗', keyword: 'dog' },
            { name: '🐱 貓', keyword: 'cat' },
            { name: '🐰 兔子', keyword: 'rabbit' },
            { name: '🐹 倉鼠', keyword: 'hamster' },
            { name: '🐦 鳥', keyword: 'bird' }
        ];

        function save() {

            localStorage.setItem(
                'users',
                JSON.stringify(users)
            );

            localStorage.setItem(
                'posts',
                JSON.stringify(posts)
            );

            localStorage.setItem(
                'currentUser',
                JSON.stringify(currentUser)
            );
        }

        function showPage(id) {

            document
                .querySelectorAll('.card')
                .forEach(p => p.classList.add('hidden'));

            document
                .getElementById(id)
                .classList.remove('hidden');

            render();
        }

        function fileToBase64(file, callback) {

            let reader = new FileReader();

            reader.onload = e => callback(e.target.result);

            reader.readAsDataURL(file);
        }

        function register() {

            let id =
                document.getElementById('regId').value;

            let name =
                document.getElementById('regName').value;

            let pass =
                document.getElementById('regPass').value;

            let file =
                document.getElementById('regAvatar').files[0];

            if (!id || !name || !pass) {

                alert('請完整填寫');
                return;
            }

            if (users.find(u => u.id === id)) {

                alert('ID已存在');
                return;
            }

            if (file) {

                fileToBase64(file, av => {

                    users.push({
                        id,
                        name,
                        pass,
                        av
                    });

                    save();

                    alert('註冊成功');
                });

            } else {

                users.push({
                    id,
                    name,
                    pass,
                    av: ''
                });

                save();

                alert('註冊成功');
            }
        }

        function login() {

            let loginId =
                document.getElementById('loginId').value;

            let loginPass =
                document.getElementById('loginPass').value;

            let user = users.find(u =>
                u.id === loginId &&
                u.pass === loginPass
            );

            if (!user) {

                alert('登入失敗');
                return;
            }

            tempLoginUser = user;

            generateCaptcha();

            showPage('tfaPage');
        }

        function logout() {

            currentUser = null;

            save();

            alert('已登出');

            showPage('loginPage');
        }

        function publishPost() {

            if (!currentUser) return;

            let title =
                document.getElementById('postTitle').value;

            let content =
                document.getElementById('postContent').value;

            let file =
                document.getElementById('postImage').files[0];

            let createPost = (img) => {

                posts.unshift({

                    user: currentUser,
                    title,
                    content,
                    img,
                    likes: 0,
                    comments: []

                });

                save();

                showPage('sharePage');
            };

            if (file) {

                fileToBase64(file, createPost);

            } else {

                createPost('');
            }
        }

        function likePost(index) {

            posts[index].likes++;

            save();

            render();
        }

        function commentPost(index) {

            if (!currentUser) {

                alert('請先登入');
                return;
            }

            let text = prompt('輸入留言');

            if (!text) return;

            posts[index].comments.push({

                user: currentUser.id,
                text

            });

            save();

            render();
        }

        function deletePost(index) {

            if (!confirm('確定刪除？')) return;

            posts.splice(index, 1);

            save();

            render();
        }

        function viewUserProfile(userId) {

            currentViewedUserId = userId;

            showPage('userProfilePage');
        }

        function render() {

            const defaultAvatar =
                'https://cdn-icons-png.flaticon.com/512/616/616408.png';

            document.getElementById('navLoginBtn').style.display =
                currentUser ? 'none' : 'inline-block';

            if (currentUser) {

                document.getElementById('welcome').innerText =
                    '歡迎 ' + currentUser.name;

                document.getElementById('postAvatar').src =
                    currentUser.av || defaultAvatar;

                document.getElementById('postUser').innerText =
                    currentUser.id;
            }

            document.getElementById('myPosts').innerHTML =

                posts.map((p, i) => {

                    if (
                        currentUser &&
                        p.user.id === currentUser.id
                    ) {

                        return `
                            <div class="post">

                                <h3>${p.title}</h3>

                                <p>${p.content}</p>

                                ${p.img
                                ? `<img src="${p.img}" class="post-img">`
                                : ''}

                                <br><br>

                                <button onclick="deletePost(${i})">
                                    刪除
                                </button>

                            </div>
                        `;
                    }

                    return '';

                }).join('');

            document.getElementById('allPosts').innerHTML =

                posts.map((p, i) => {

                    return `
                        <div class="post">

                            <img
                                src="${p.user.av || defaultAvatar}"
                                class="avatar"
                                style="cursor:pointer;"
                                onclick="viewUserProfile('${p.user.id}')"
                            >

                            <b
                                style="cursor:pointer;color:#ff6aa4;"
                                onclick="viewUserProfile('${p.user.id}')"
                            >
                                ${p.user.id}
                            </b>

                            <h3>${p.title}</h3>

                            <p>${p.content}</p>

                            ${p.img
                            ? `<img src="${p.img}" class="post-img">`
                            : ''}

                            <div>

                                <span
                                    class="icon"
                                    onclick="likePost(${i})"
                                >
                                    ❤️ ${p.likes}
                                </span>

                                <span
                                    class="icon"
                                    onclick="commentPost(${i})"
                                >
                                    💬
                                </span>

                            </div>

                            <small>
                                ${(p.comments || []).map(c =>
                                `${c.user}: ${c.text}`
                            ).join('<br>')}
                            </small>

                        </div>
                    `;
                }).join('');

            if (currentViewedUserId) {

                let user =
                    users.find(u => u.id === currentViewedUserId);

                if (!user) return;

                document.getElementById('userProfileAvatar').src =
                    user.av || defaultAvatar;

                document.getElementById('userProfileName').innerText =
                    user.name;

                document.getElementById('userProfileId').innerText =
                    '@' + user.id;

                document.getElementById('userProfilePosts').innerHTML =

                    posts.map((p, i) => {

                        if (p.user.id === user.id) {

                            return `
                                <div class="post">

                                    <h3>${p.title}</h3>

                                    <p>${p.content}</p>

                                    ${p.img
                                    ? `<img src="${p.img}" class="post-img">`
                                    : ''}

                                    <div>

                                        <span
                                            class="icon"
                                            onclick="likePost(${i})"
                                        >
                                            ❤️ ${p.likes}
                                        </span>

                                    </div>

                                </div>
                            `;
                        }

                        return '';

                    }).join('');
            }
        }

        function generateCaptcha() {

            let target =
                captchaThemes[
                Math.floor(Math.random() * captchaThemes.length)
                ];

            document.getElementById('captchaThemeText').innerText =
                target.name;

            let grid = [];

            for (let i = 0; i < 9; i++) {

                let isTarget = i < 3;

                let keyword = isTarget
                    ? target.keyword
                    : captchaThemes[
                        Math.floor(Math.random() * captchaThemes.length)
                    ].keyword;

                grid.push({

                    src:
                        `https://loremflickr.com/150/150/${keyword}?random=${Math.random()}`,

                    isTarget
                });
            }

            grid.sort(() => Math.random() - 0.5);

            captchaCorrectIndexes = [];

            grid.forEach((g, i) => {

                if (g.isTarget)
                    captchaCorrectIndexes.push(i);
            });

            captchaSelected = [];

            document.getElementById('captchaGrid').innerHTML =

                grid.map((g, i) => `

                    <div
                        class="captcha-item"
                        id="captcha-${i}"
                        onclick="toggleCaptcha(${i})"
                    >

                        <img src="${g.src}">

                    </div>

                `).join('');
        }

        function toggleCaptcha(index) {

            let el =
                document.getElementById(`captcha-${index}`);

            if (captchaSelected.includes(index)) {

                captchaSelected =
                    captchaSelected.filter(i => i !== index);

                el.classList.remove('selected');

            } else {

                captchaSelected.push(index);

                el.classList.add('selected');
            }
        }

        function verifyCaptcha() {

            let ok =
                captchaCorrectIndexes.length === captchaSelected.length &&
                captchaCorrectIndexes.every(i =>
                    captchaSelected.includes(i)
                );

            if (!ok) {

                alert('驗證失敗');

                generateCaptcha();

                return;
            }

            currentUser = tempLoginUser;

            save();

            showPage('homePage');
        }

        render();

        showPage('sharePage');

    </script>

</body>

</html>
