<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寵物分享交流平台</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff7f2;
            margin: 0;
            color: #444
        }

        header {
            background: #ff9ecb;
            padding: 15px;
            color: #fff;
            text-align: center;
            font-size: 24px;
            font-weight: bold
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .1);
            margin: 15px 0
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #ddd
        }

        button {
            background: #ff8bb8;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer
        }

        button:hover {
            background: #ff6aa4
        }

        .post-img,
        .avatar {
            max-width: 100px;
            border-radius: 50%
        }

        .hidden {
            display: none
        }

        .post {
            border-bottom: 1px solid #eee;
            padding: 15px 0
        }

        .icon {
            cursor: pointer;
            margin-right: 10px
        }

        .nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0
        }

        .captcha-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 4px solid transparent;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            background: #f0f0f0;
        }

        .captcha-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .captcha-item.selected {
            border-color: #ff8bb8;
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(255, 139, 184, 0.5);
        }
    </style>
</head>

<body>
    <header>🐾 寵物分享交流平台</header>
    <div class="container">
        <div class="nav">
            <button id="navLoginBtn" onclick="showPage('loginPage')">登入/註冊</button>
            <button onclick="showPage('homePage')">個人首頁</button>
            <button onclick="showPage('sharePage')">分享區</button>
        </div>
        <div id="loginPage" class="card">
            <h2>登入 / 註冊</h2>
            <input id="regId" placeholder="ID"><input id="regName" placeholder="名稱"><input id="regPass" type="password"
                placeholder="密碼"><input type="file" id="regAvatar"><button onclick="register()">註冊</button>
            <hr><input id="loginId" placeholder="ID"><input id="loginPass" type="password" placeholder="密碼"><button
                onclick="login()">登入</button>
        </div>
        <div id="homePage" class="card hidden">
            <h2 id="welcome"></h2>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button onclick="showPage('postPage')">新增貼文</button>
                <button onclick="logout()" style="background:#999;">登出帳號</button>
            </div>
            <div id="myPosts"></div>
        </div>
        <div id="postPage" class="card hidden">
            <h2>發布貼文</h2><img id="postAvatar" class="avatar">
            <p id="postUser"></p><input id="postTitle" placeholder="發布主題"><textarea id="postContent"
                placeholder="發布內容"></textarea><input type="file" id="postImage"><button
                onclick="publishPost()">發布</button>
        </div>
        <div id="sharePage" class="card hidden">
            <h2>分享區</h2>
            <div id="allPosts"></div>
        </div>
        <div id="userProfilePage" class="card hidden">
            <div
                style="display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #ffe6f0; padding-bottom: 15px; margin-bottom: 20px;">
                <img id="userProfileAvatar" class="avatar"
                    style="width: 80px; height: 80px; object-fit: cover; border: 3px solid #ff9ecb;">
                <div>
                    <h2 id="userProfileName" style="margin: 0; color: #ff6aa4; font-size: 24px;"></h2>
                    <span id="userProfileId"
                        style="color: #888; font-size: 14px; background: #fff0f5; padding: 3px 8px; border-radius: 10px; display: inline-block; margin-top: 5px;"></span>
                </div>
                <button onclick="showPage('sharePage')" style="margin-left: auto; background: #ff8bb8;">返回分享區</button>
            </div>
            <h3 style="color: #555; margin-bottom: 15px;">🐾 個人貼文</h3>
            <div id="userProfilePosts"></div>
        </div>
        <div id="tfaPage" class="card hidden">
            <h2>雙重認證 - 我不是機器人</h2>
            <p>請選出所有包含「<span id="captchaThemeText">🐶 狗</span>」的圖片：</p>
            <div id="captchaGrid"
                style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:15px;max-width:260px;margin-left:auto;margin-right:auto;">
            </div>
            <button onclick="verifyCaptcha()">驗證</button>
        </div>
    </div>
    <script>
        let users = JSON.parse(localStorage.getItem('users') || '[]'); let posts = JSON.parse(localStorage.getItem('posts') || '[]'); let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        let currentViewedUserId = null;
        function save() { localStorage.setItem('users', JSON.stringify(users)); localStorage.setItem('posts', JSON.stringify(posts)); localStorage.setItem('currentUser', JSON.stringify(currentUser)); }
        function showPage(id) {
            document.querySelectorAll('.card').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id !== 'userProfilePage') {
                currentViewedUserId = null;
            }
            if (id === 'postPage') {
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                document.getElementById('postImage').value = '';
            }
            render();
        }
        function fileToBase64(file, cb) { let r = new FileReader(); r.onload = e => cb(e.target.result); r.readAsDataURL(file) }
        function register() { let id = regId.value, name = regName.value, pass = regPass.value, file = regAvatar.files[0]; if (!id || !name || !pass) return alert('請完整填寫'); if (users.find(u => u.id === id)) return alert('ID已存在'); if (file) { fileToBase64(file, av => { users.push({ id, name, pass, av }); save(); alert('註冊成功') }) } else users.push({ id, name, pass, av: '' }), save(), alert('註冊成功'); }
        let tempLoginUser = null;
        let captchaSelected = [];
        let captchaCorrectIndexes = [];

        const captchaThemes = [
            { name: '🐶 狗', keyword: 'dog' },
            { name: '🐱 貓', keyword: 'cat' },
            { name: '🐰 兔子', keyword: 'rabbit' },
            { name: '🐹 倉鼠', keyword: 'hamster' },
            { name: '🐦 鳥', keyword: 'bird' }
        ];

        function generateCaptcha() {
            let targetIndex = Math.floor(Math.random() * captchaThemes.length);
            let targetTheme = captchaThemes[targetIndex];

            document.getElementById('captchaThemeText').innerText = targetTheme.name;

            // Generate 3 unique random locks for target images
            let targetLocks = [];
            while (targetLocks.length < 3) {
                let lock = Math.floor(Math.random() * 1000) + 1;
                if (!targetLocks.includes(lock)) {
                    targetLocks.push(lock);
                }
            }
            let targetImages = targetLocks.map(lock => `https://loremflickr.com/150/150/${targetTheme.keyword}?lock=${lock}`);

            // Generate 6 distractor images from other categories
            let distractorImages = [];
            let otherThemes = captchaThemes.filter((_, idx) => idx !== targetIndex);

            for (let i = 0; i < 6; i++) {
                let randomOtherTheme = otherThemes[Math.floor(Math.random() * otherThemes.length)];
                let lock = Math.floor(Math.random() * 1000) + 1001 + i;
                distractorImages.push(`https://loremflickr.com/150/150/${randomOtherTheme.keyword}?lock=${lock}`);
            }

            let gridItems = [
                ...targetImages.map(img => ({ src: img, isTarget: true })),
                ...distractorImages.map(img => ({ src: img, isTarget: false }))
            ];

            gridItems.sort(() => Math.random() - 0.5);

            captchaCorrectIndexes = [];
            gridItems.forEach((item, index) => {
                if (item.isTarget) {
                    captchaCorrectIndexes.push(index);
                }
            });

            captchaSelected = [];

            document.getElementById('captchaGrid').innerHTML = gridItems.map((item, i) =>
                `<div class="captcha-item" id="captcha-${i}" onclick="toggleCaptcha(${i})"><img src="${item.src}"></div>`
            ).join('');
        }

        function toggleCaptcha(index) {
            let el = document.getElementById('captcha-' + index);
            if (captchaSelected.includes(index)) {
                captchaSelected = captchaSelected.filter(i => i !== index);
                el.classList.remove('selected');
            } else {
                captchaSelected.push(index);
                el.classList.add('selected');
            }
        }

        function verifyCaptcha() {
            let isCorrect = captchaCorrectIndexes.length === captchaSelected.length &&
                captchaCorrectIndexes.every(val => captchaSelected.includes(val));
            if (isCorrect) {
                currentUser = tempLoginUser; save(); showPage('homePage');
            } else {
                alert('驗證失敗，請重新選擇！'); generateCaptcha();
            }
        }

        function login() { let u = users.find(x => x.id === loginId.value && x.pass === loginPass.value); if (!u) return alert('登入失敗'); tempLoginUser = u; generateCaptcha(); showPage('tfaPage'); }

        function logout() {
            currentUser = null;
            save();
            alert('您已成功登出！');
            showPage('loginPage');
        }
        function publishPost() { if (!currentUser) return; let file = postImage.files[0]; let create = (img) => { posts.unshift({ user: currentUser, title: postTitle.value, content: postContent.value, img, likes: 0, comments: [] }); save(); document.getElementById('postTitle').value = ''; document.getElementById('postContent').value = ''; document.getElementById('postImage').value = ''; showPage('sharePage'); }; file ? fileToBase64(file, create) : create(''); }
        function likePost(i) { posts[i].likes++; save(); render(); }
        function commentPost(i) { if (!currentUser) { if (confirm('是否有平台帳號？')) showPage('loginPage'); return; } let c = prompt('輸入留言'); if (c) { posts[i].comments.push({ user: currentUser.id, text: c }); save(); render(); } }
        function deletePost(i) { if (confirm('確定要刪除這則貼文嗎？')) { posts.splice(i, 1); save(); render(); } }
        function render() {
            const defaultAvatar = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiB2aWV3Qm94PSIwIDAgMTAwIDEwMCI+PGNpcmNsZSBjeD0iNTAiIGN5PSI1MCIgcj0iNTAiIGZpbGw9IiNmZmUwZWIiLz48dGV4dCB4PSI1MCIgeT0iNjIiIGZvbnQtc2l6ZT0iNDAiIHRleHQtYW5jaG9yPSJtaWRkbGUiPvCfkL48L3RleHQ+PC9zdmc+';

            if (currentUser) {
                welcome.innerText = '歡迎 ' + currentUser.name;
                postAvatar.src = currentUser.av || defaultAvatar;
                postUser.innerText = currentUser.id;
            }
            document.getElementById('navLoginBtn').style.display = currentUser ? 'none' : 'inline-block';
            
            // Render myPosts safely
            myPosts.innerHTML = posts.map((p, i) => (currentUser && p.user?.id === currentUser.id) ? `<div class='post'><b>${p.title}</b><p>${p.content}</p><button onclick='deletePost(${i})' style='background:#ff4d4d; padding:5px 10px; font-size:12px; margin-top:10px;'>刪除貼文</button></div>` : '').join('');
            
            // Render allPosts safely
            allPosts.innerHTML = posts.map((p, i) => {
                const userAv = p.user?.av || defaultAvatar;
                const userId = p.user?.id || '未知使用者';
                return `<div class='post'>
                    <img src='${userAv}' class='avatar' onclick='viewUserProfile("${userId}")' style='cursor:pointer;'>
                    <b onclick='viewUserProfile("${userId}")' style='cursor:pointer; color:#ff8bb8;'>${userId}</b>
                    <h3>${p.title}</h3>
                    <p>${p.content}</p>
                    ${p.img ? `<img src='${p.img}' class='post-img'>` : ''}
                    <div style="display:flex; gap:10px; align-items:center;">
                        <span class='icon' onclick='likePost(${i})'>❤️ ${p.likes}</span>
                        <span class='icon' onclick='commentPost(${i})'>💬</span>
                        ${currentUser && p.user?.id === currentUser.id ? `<button onclick='deletePost(${i})' style='background:#ff4d4d; padding:5px 10px; font-size:12px; margin-left:auto;'>刪除</button>` : ''}
                    </div>
                    <small>${(p.comments || []).map(c => (c.user || '匿名') + ': ' + c.text).join('<br>')}</small>
                </div>`;
            }).join('');

            // Render userProfilePosts safely if currentViewedUserId is set
            if (currentViewedUserId) {
                let u = users.find(x => x.id === currentViewedUserId);
                if (!u) {
                    let post = posts.find(p => p.user?.id === currentViewedUserId);
                    if (post) {
                        u = post.user;
                    }
                }
                if (u) {
                    document.getElementById('userProfileAvatar').src = u.av || defaultAvatar;
                    document.getElementById('userProfileName').innerText = u.name;
                    document.getElementById('userProfileId').innerText = '@' + u.id;

                    let userPostsHtml = posts.map((p, i) => {
                        if (p.user?.id === u.id) {
                            return `<div class='post'>
                                <h3>${p.title}</h3>
                                <p>${p.content}</p>
                                ${p.img ? `<img src='${p.img}' class='post-img' style='max-width: 100%; border-radius: 12px; margin-top: 10px;'>` : ''}
                                <div style="display:flex; gap:10px; align-items:center; margin-top:10px;">
                                    <span class='icon' onclick='likePost(${i})'>❤️ ${p.likes}</span>
                                    <span class='icon' onclick='commentPost(${i})'>💬</span>
                                    ${currentUser && p.user?.id === currentUser.id ? `<button onclick='deletePost(${i})' style='background:#ff4d4d; padding:5px 10px; font-size:12px; margin-left:auto;'>刪除</button>` : ''}
                                </div>
                                <div style="background: #fff0f5; padding: 10px; border-radius: 8px; margin-top: 10px; margin-bottom: 5px;">
                                    <small>${(p.comments || []).map(c => `<b>${c.user || '匿名'}</b>: ${c.text}`).join('<br>')}</small>
                                </div>
                            </div>`;
                        }
                        return '';
                    }).join('');

                    if (!userPostsHtml.replace(/\s/g, '')) {
                        userPostsHtml = '<p style="color: #999; text-align: center; margin: 20px 0;">該使用者尚未發布任何貼文。</p>';
                    }
                    document.getElementById('userProfilePosts').innerHTML = userPostsHtml;
                }
            }
        }
        function viewUserProfile(userId) {
            currentViewedUserId = userId;
            showPage('userProfilePage');
        }
        render(); showPage('sharePage');
    </script>
</body>

</html>
