<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Share 寵物分享交流平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Nunito',sans-serif; background:#fff7f3; color:#444; }
nav{ background:#ffb6c1; padding:15px 30px; display:none; justify-content:space-between; align-items:center; flex-wrap:wrap; }
.logo{ color:white; font-size:28px; font-weight:bold; }
button{ border:none; background:#ff8fab; color:white; padding:10px 18px; border-radius:12px; cursor:pointer; margin:5px; transition:0.2s; }
button:hover{ background:#ff5d8f; transform:scale(1.03); }
.btn-secondary { background:#ccc; color:#333; }
.btn-secondary:hover { background:#bbb; }
.page{ display:none; padding:30px; }
.active{ display:block; }
input, textarea{ width:100%; padding:12px; margin-bottom:15px; border-radius:12px; border:2px solid #ffd6df; font-size:15px; }
textarea{ min-height:150px; resize:none; }
.auth-container{ display:flex; justify-content:center; gap:30px; flex-wrap:wrap; margin-top:40px; }
.auth-box{ background:white; width:360px; padding:30px; border-radius:20px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
.auth-box h2{ text-align:center; margin-bottom:20px; color:#ff5d8f; }
.profile-card{ background:white; max-width:500px; margin:auto; padding:30px; border-radius:20px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
.profile-card img{ width:120px; height:120px; border-radius:50%; object-fit:cover; }
.post-form{ background:white; max-width:700px; margin:auto; padding:30px; border-radius:20px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
.post-user-info{ display:flex; align-items:center; gap:15px; margin-bottom:20px; }
.post-user-info img{ width:70px; height:70px; border-radius:50%; object-fit:cover; }
.feed-title{ text-align:center; margin-bottom:30px; color:#ff5d8f; }
.post-card{ background:white; max-width:700px; margin:20px auto; padding:20px; border-radius:20px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
.post-header{ display:flex; align-items:center; gap:15px; cursor:pointer; }
.post-header img{ width:60px; height:60px; border-radius:50%; object-fit:cover; }
.post-image{ width:100%; margin-top:15px; border-radius:15px; max-height:500px; object-fit:cover; }
.post-actions{ display:flex; gap:20px; margin-top:15px; }
.post-actions div{ cursor:pointer; font-weight:bold; }
.comments{ margin-top:15px; background:#fff4f7; padding:15px; border-radius:15px; }
.comment-input-area{ display:flex; gap:10px; }
.comment-input-area input{ margin:0; }
.verify-images{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:15px; }
.verify-images img{ width:100%; height:120px; object-fit:cover; border-radius:12px; border:4px solid transparent; cursor:pointer; transition:0.2s; }
.verify-images img.selected{ border-color:#ff5d8f; transform:scale(0.95); }
.delete-btn{ background:#ff4d6d; margin-top:10px; }
.time-text{ font-size:12px; color:gray; margin-top:5px; }
@media(max-width:768px){
    .auth-container{ flex-direction:column; align-items:center; }
    nav{ justify-content:center; gap:10px; }
}
</style>
</head>
<body>

<nav id="navbar">
    <div class="logo">🐾 Pet Share</div>
    <div>
        <button id="feedBtn">分享區</button>
        <button id="profileBtn">個人首頁</button>
        <button id="logoutBtn">登出</button>
    </div>
</nav>

<!-- 登入頁 -->
<section id="authPage" class="page">
    <div class="auth-container">
        <div class="auth-box" id="loginBox">
            <h2>登入</h2>
            <input type="text" id="loginId" placeholder="輸入ID">
            <input type="password" id="loginPassword" placeholder="輸入密碼">
            <button id="openVerifyBtn" style="width:100%;">登入</button>
            <p style="margin-top:15px;text-align:center;">
                還沒有帳號？ <span id="goRegister" style="color:#ff5d8f;cursor:pointer;font-weight:bold;">立即註冊</span>
            </p>
        </div>

        <div class="auth-box" id="registerBox" style="display:none;">
            <h2>註冊</h2>
            <input type="text" id="registerId" placeholder="建立ID">
            <input type="text" id="registerName" placeholder="輸入名稱">
            <input type="password" id="registerPassword" placeholder="建立密碼">
            <input type="file" id="registerAvatar" accept="image/*">
            <button id="registerBtn" style="width:100%;">註冊帳號</button>
            <p style="margin-top:15px;text-align:center;">
                已經有帳號？ <span id="goLogin" style="color:#ff5d8f;cursor:pointer;font-weight:bold;">返回登入</span>
            </p>
        </div>
    </div>

    <!-- 驗證視窗 -->
    <div id="verifyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:999;">
        <div style="background:white;padding:30px;border-radius:20px;max-width:500px;width:90%;">
            <h2 style="text-align:center;color:#ff5d8f;">圖片式雙重認證</h2>
            <p style="text-align:center;margin-top:10px;">請選擇所有「狗狗」圖片</p>
            <div class="verify-images" id="verifyImages"></div>
            <button id="loginBtn" style="width:100%;margin-top:20px;">完成驗證並登入</button>
            <button id="cancelVerifyBtn" class="btn-secondary" style="width:100%;margin-top:10px;">取消</button>
        </div>
    </div>
</section>

<!-- 個人頁 -->
<section id="profilePage" class="page">
    <div class="profile-card">
        <img id="profileAvatar">
        <h2 id="profileName"></h2>
        <p id="profileId"></p>
        <button id="newPostBtn">➕ 新增貼文</button>
    </div>
    <div id="myPosts"></div>
</section>

<!-- 發文頁 -->
<section id="postPage" class="page">
    <div class="post-form">
        <div class="post-user-info">
            <img id="postAvatar">
            <div>
                <h3 id="postUserName"></h3>
                <p id="postUserId"></p>
            </div>
        </div>
        <input type="text" id="postTitle" placeholder="輸入發布主題">
        <textarea id="postContent" placeholder="分享你的寵物故事吧..."></textarea>
        <input type="file" id="postImage" accept="image/*">
        <button id="publishBtn">發布貼文</button>
    </div>
</section>

<!-- 分享區 -->
<section id="feedPage" class="page">
    <h1 class="feed-title">🐶 大家的分享區 🐱</h1>
    <div id="feedContainer"></div>
</section>

<!-- 使用者頁 -->
<section id="userPage" class="page">
    <div class="profile-card">
        <img id="viewUserAvatar">
        <h2 id="viewUserName"></h2>
        <p id="viewUserId"></p>
    </div>
    <h2 style="text-align:center;margin-top:30px;">使用者貼文</h2>
    <div id="userPosts"></div>
</section>

<script>
/* =========================
初始化與防呆保護
========================= */
let users = [];
try { 
    const parsed = JSON.parse(localStorage.getItem('users')); 
    users = Array.isArray(parsed) ? parsed : [];
} catch { users = []; }

let posts = [];
try { 
    const parsed = JSON.parse(localStorage.getItem('posts')); 
    posts = Array.isArray(parsed) ? parsed : [];
} catch { posts = []; }

let currentUser = null;
try {
    const parsed = JSON.parse(localStorage.getItem('currentUser'));
    if (parsed && typeof parsed === 'object') currentUser = parsed;
} catch { currentUser = null; }

let selectedVerify = [];
let shuffledImages = [];
const defaultAvatar = 'https://cdn-icons-png.flaticon.com/512/616/616408.png';

/* =========================
DOM
========================= */
const navbar = document.getElementById('navbar');

const loginBox = document.getElementById('loginBox');
const registerBox = document.getElementById('registerBox');
const goRegister = document.getElementById('goRegister');
const goLogin = document.getElementById('goLogin');

const loginId = document.getElementById('loginId');
const loginPassword = document.getElementById('loginPassword');
const registerId = document.getElementById('registerId');
const registerName = document.getElementById('registerName');
const registerPassword = document.getElementById('registerPassword');
const registerAvatar = document.getElementById('registerAvatar');

const profileAvatar = document.getElementById('profileAvatar');
const profileName = document.getElementById('profileName');
const profileId = document.getElementById('profileId');

const postAvatar = document.getElementById('postAvatar');
const postUserName = document.getElementById('postUserName');
const postUserId = document.getElementById('postUserId');
const postTitle = document.getElementById('postTitle');
const postContent = document.getElementById('postContent');
const postImage = document.getElementById('postImage');

const viewUserAvatar = document.getElementById('viewUserAvatar');
const viewUserName = document.getElementById('viewUserName');
const viewUserId = document.getElementById('viewUserId');

const feedContainer = document.getElementById('feedContainer');
const myPosts = document.getElementById('myPosts');
const userPosts = document.getElementById('userPosts');

const verifyModal = document.getElementById('verifyModal');

const images = [
    { type:'dog', src:'https://images.unsplash.com/photo-1517849845537-4d257902454a?w=300' },
    { type:'cat', src:'https://images.unsplash.com/photo-1519052537078-e6302a4968d4?w=300' },
    { type:'dog', src:'https://images.unsplash.com/photo-1517423440428-a5a00ad493e8?w=300' },
    { type:'cat', src:'https://images.unsplash.com/photo-1495360010541-f48722b34f7d?w=300' },
    { type:'dog', src:'https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=300' },
    { type:'cat', src:'https://images.unsplash.com/photo-1511044568932-338cba0ad803?w=300' },
    { type:'dog', src:'https://images.unsplash.com/photo-1507146426996-ef05306b995a?w=300' },
    { type:'cat', src:'https://images.unsplash.com/photo-1472491235688-bdc81a63246e?w=300' },
    { type:'dog', src:'https://images.unsplash.com/photo-1525253086316-d0c936c814f8?w=300' }
];

/* =========================
工具
========================= */
// 增強防呆：防止傳入 undefined 導致 replace 報錯死機
function escapeHTML(str){
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

// 增強防呆：強制隱藏其他頁面，並顯示目標頁面
function showPage(pageId){
    document.querySelectorAll('.page').forEach(p => {
        p.classList.remove('active');
        p.style.display = 'none'; // 強制清除畫面
    });
    const target = document.getElementById(pageId);
    if(target){
        target.classList.add('active');
        target.style.display = 'block'; // 強制顯示目標
    }
}

function updateNavbar(){
    navbar.style.display = currentUser ? 'flex' : 'none';
}

function refreshAllPosts(){
    try { loadFeed(); } catch(e) { console.error(e); }
    if(currentUser) {
        try { loadMyPosts(); } catch(e) { console.error(e); }
    }
    
    const currentViewId = viewUserId.dataset.id;
    if(currentViewId){
        userPosts.innerHTML = '';
        posts.filter(p=>p.userId===currentViewId).reverse().forEach(post=>{
            userPosts.innerHTML += createPost(post, 'user');
        });
    }
}

function processImage(file, callback) {
    if (!file) return callback('');
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const MAX_SIZE = 600;
            let width = img.width, height = img.height;
            if (width > height && width > MAX_SIZE) {
                height *= MAX_SIZE / width; width = MAX_SIZE;
            } else if (height > MAX_SIZE) {
                width *= MAX_SIZE / height; height = MAX_SIZE;
            }
            canvas.width = width; canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            callback(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

/* =========================
驗證
========================= */
function renderVerify(){
    const container = document.getElementById('verifyImages');
    container.innerHTML='';
    selectedVerify = [];
    shuffledImages = [...images].sort(()=>Math.random()-0.5);
    shuffledImages.forEach((img,index)=>{
        const image = document.createElement('img');
        image.src = img.src;
        image.dataset.index = index;
        image.addEventListener('click',()=>{
            const idx = Number(image.dataset.index);
            image.classList.toggle('selected');
            if(selectedVerify.includes(idx)){
                selectedVerify = selectedVerify.filter(i=>i!==idx);
            }else{
                selectedVerify.push(idx);
            }
        });
        container.appendChild(image);
    });
}

document.getElementById('cancelVerifyBtn').addEventListener('click', ()=>{
    verifyModal.style.display = 'none';
});

/* =========================
切換登入註冊
========================= */
goRegister.addEventListener('click',()=>{
    loginBox.style.display='none';
    registerBox.style.display='block';
});

goLogin.addEventListener('click',()=>{
    registerBox.style.display='none';
    loginBox.style.display='block';
});

/* =========================
註冊
========================= */
document.getElementById('registerBtn').addEventListener('click',()=>{
    const id = registerId.value.trim();
    const name = registerName.value.trim();
    const password = registerPassword.value.trim();
    const avatarFile = registerAvatar.files[0];

    if(!id || !name || !password){ alert('請完整填寫資料'); return; }
    const existUser = users.find(u=>u.id===id);
    if(existUser){ alert('此ID已存在'); return; }

    const saveUser = (avatar)=>{
        users.push({ id, name, password, avatar });
        try {
            localStorage.setItem('users', JSON.stringify(users));
            alert('🎉 註冊成功！');
            registerId.value=''; registerName.value=''; registerPassword.value=''; registerAvatar.value='';
            registerBox.style.display='none';
            loginBox.style.display='block';
        } catch (e) {
            alert('儲存空間不足，請選擇更小的圖片！');
            users.pop();
        }
    };

    if(avatarFile) processImage(avatarFile, saveUser);
    else saveUser(defaultAvatar);
});

/* =========================
登入
========================= */
document.getElementById('openVerifyBtn').addEventListener('click',()=>{
    const id = loginId.value.trim();
    const password = loginPassword.value.trim();
    if(!id || !password){ alert('請輸入帳號密碼'); return; }
    renderVerify();
    verifyModal.style.display='flex';
});

/* =========================
個人資料
========================= */
function loadProfile(){
    if(!currentUser) return;
    profileAvatar.src = currentUser.avatar || defaultAvatar;
    profileName.innerText = currentUser.name || 'Unknown';
    profileId.innerText = '@'+currentUser.id;
    
    if(postAvatar) postAvatar.src = currentUser.avatar || defaultAvatar;
    if(postUserName) postUserName.innerText = currentUser.name || 'Unknown';
    if(postUserId) postUserId.innerText = '@'+currentUser.id;
    
    loadMyPosts();
    loadFeed();
}

document.getElementById('loginBtn').addEventListener('click',()=>{
    const id = loginId.value.trim();
    const password = loginPassword.value.trim();
    const selectedTypes = selectedVerify.map(i=>shuffledImages[i].type);
    const dogCount = shuffledImages.filter(i=>i.type==='dog').length;
    const allDog = selectedTypes.length === dogCount && selectedTypes.every(type=>type==='dog');

    if(!allDog){ alert('請完整選擇所有狗狗圖片'); return; }

    const user = users.find(u=>u.id===id && u.password===password);
    if(!user){ alert('帳號或密碼錯誤'); return; }

    currentUser = user;
    localStorage.setItem('currentUser', JSON.stringify(user));
    verifyModal.style.display='none';
    
    // 確保即使載入錯誤，依然能完成登入流程，不卡死
    updateNavbar();
    try { loadProfile(); } catch(e) { console.error(e); }
    showPage('profilePage'); 
});

/* =========================
發文
========================= */
document.getElementById('publishBtn').addEventListener('click',()=>{
    const title = postTitle.value.trim();
    const content = postContent.value.trim();
    const imageFile = postImage.files[0];

    if(!title || !content){ alert('請完整填寫'); return; }

    const savePost = (image='')=>{
        posts.push({
            id:Date.now(),
            userId:currentUser.id,
            userName:currentUser.name,
            avatar:currentUser.avatar,
            title, content, image, likes:0, comments:[],
            createdAt:new Date().toLocaleString()
        });
        
        try {
            localStorage.setItem('posts', JSON.stringify(posts));
            postTitle.value=''; postContent.value=''; postImage.value='';
            refreshAllPosts();
            showPage('profilePage');
        } catch (e) {
            alert('儲存空間不足，請選擇更小的圖片！');
            posts.pop();
        }
    };

    if(imageFile) processImage(imageFile, savePost);
    else savePost('');
});

/* =========================
貼文HTML
========================= */
function createPost(post, context = 'feed'){
    const safeComments = Array.isArray(post.comments) ? post.comments : [];
    return `
    <div class="post-card">
        <div class="post-header" onclick="openUserPage('${escapeHTML(post.userId)}')">
            <img src="${post.avatar}" onerror="this.src='${defaultAvatar}'">
            <div>
                <h3>${escapeHTML(post.userName)}</h3>
                <p>@${escapeHTML(post.userId)}</p>
                <p class="time-text">${escapeHTML(post.createdAt)}</p>
            </div>
        </div>
        <h2 style="margin-top:15px;">${escapeHTML(post.title)}</h2>
        <p style="margin-top:10px;white-space:pre-wrap;">${escapeHTML(post.content)}</p>
        ${post.image ? `<img class="post-image" src="${post.image}">` : ''}
        <div class="post-actions">
            <div onclick="likePost(${post.id})">❤️ ${post.likes || 0}</div>
            <div>💬 ${safeComments.length}</div>
        </div>
        <div class="comments">
            ${safeComments.map(c=>`
                <div style="margin-bottom:10px;">
                    <strong>${escapeHTML(c.user)}</strong>：${escapeHTML(c.text)}
                </div>
            `).join('')}
            <div class="comment-input-area">
                <input type="text" placeholder="輸入留言">
                <!-- 傳入 event 事件以解決 ID 衝突 -->
                <button onclick="sendComment(event, ${post.id})">送出</button>
            </div>
            ${currentUser && currentUser.id === post.userId ? `
                <button class="delete-btn" onclick="deletePost(${post.id})">🗑️ 刪除貼文</button>
            ` : ''}
        </div>
    </div>
    `;
}

/* =========================
載入貼文
========================= */
function loadFeed(){
    feedContainer.innerHTML='';
    posts.slice().reverse().forEach(post=>{
        feedContainer.innerHTML += createPost(post, 'feed');
    });
}

function loadMyPosts(){
    myPosts.innerHTML='';
    posts.filter(p=>p.userId===currentUser.id).reverse().forEach(post=>{
        myPosts.innerHTML += createPost(post, 'my');
    });
}

/* =========================
留言
========================= */
function sendComment(event, id) {
    if (!currentUser) {
        alert('請先登入');
        showPage('authPage');
        return;
    }

    // 直接從觸發按鈕找到該輸入框
    const wrapper = event.target.parentElement;
    const input = wrapper.querySelector('input');
    
    if (!input || !input.value.trim()) return;

    const post = posts.find(p => p.id === id);
    if (!post) return;

    if (!Array.isArray(post.comments)) post.comments = [];
    post.comments.push({
        user: currentUser.name,
        text: input.value.trim()
    });

    input.value = '';
    localStorage.setItem('posts', JSON.stringify(posts));
    
    // 重新載入當前畫面，但保持在當前狀態
    refreshAllPosts();
}

/* =========================
按讚與刪除
========================= */
function likePost(id){
    if(!currentUser){ alert('請先登入'); return; }
    const post = posts.find(p=>p.id===id);
    post.likes = (post.likes || 0) + 1;
    localStorage.setItem('posts', JSON.stringify(posts));
    refreshAllPosts();
}

function deletePost(id){
    if(!currentUser) return;
    if(!confirm('確定要刪除貼文嗎？')) return;
    
    const index = posts.findIndex(p=>p.id===id);
    if(index === -1 || posts[index].userId !== currentUser.id) return;

    posts.splice(index,1);
    localStorage.setItem('posts', JSON.stringify(posts));
    refreshAllPosts();
}

/* =========================
使用者頁面
========================= */
function openUserPage(userId) {
    const user = users.find(u => u.id === userId);
    if (!user) {
        alert('找不到該使用者');
        return;
    }

    // 更新 DOM 內容
    viewUserAvatar.src = user.avatar || defaultAvatar;
    viewUserName.innerText = user.name || 'Unknown';
    viewUserId.innerText = '@' + user.id;
    viewUserId.dataset.id = user.id;

    // 清除舊資料並重新渲染
    userPosts.innerHTML = '';
    const userPostList = posts.filter(p => p.userId === userId).reverse();
    
    if (userPostList.length === 0) {
        userPosts.innerHTML = '<p style="text-align:center; margin-top:20px;">此人尚未發布任何貼文</p>';
    } else {
        userPostList.forEach(post => {
            userPosts.innerHTML += createPost(post, 'user');
        });
    }

    showPage('userPage');
}

/* =========================
導覽列跳轉保護
========================= */
document.getElementById('newPostBtn').addEventListener('click',()=>{
    if(!currentUser){ alert('請先登入'); return; }
    showPage('postPage');
});

document.getElementById('feedBtn').addEventListener('click',()=>{
    try { loadFeed(); } catch(e){} // 即使出錯也繼續執行切換
    showPage('feedPage');
});

document.getElementById('profileBtn').addEventListener('click',()=>{
    if(!currentUser){ alert('請先登入'); showPage('authPage'); return; }
    try { loadProfile(); } catch(e){}
    showPage('profilePage');
});

document.getElementById('logoutBtn').addEventListener('click',()=>{
    localStorage.removeItem('currentUser');
    currentUser = null;
    loginId.value='';
    loginPassword.value='';
    updateNavbar();
    showPage('authPage');
});

/* =========================
初始執行
========================= */
updateNavbar();
if(currentUser){
    try { loadProfile(); } catch(e){}
    showPage('profilePage');
} else {
    showPage('authPage');
}
</script>
</body>
</html>
